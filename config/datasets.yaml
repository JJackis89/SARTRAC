# ERDDAP Dataset Configuration for Sargassum Detection
# Real dataset IDs found on NOAA CoastWatch ERDDAP servers
#
# NOTE: VIIRS NOAA-20 daily chlorophyll (noaacwNPPN20VIIRSchlociDaily) stopped
# receiving data in Sept 2021 and uses a different variable name (chl_oci).
# It has been replaced with active Sentinel-3 datasets below.

# ───── Active datasets (Sentinel-3 OLCI) ─────────────────────────────

# Sentinel-3A OLCI Chlorophyll Global 4km — ACTIVE, data to present
s3a_olci_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3AOLCIchlaDaily"
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude"
  time: "time"
  has_altitude: true        # griddap dimension order: time, altitude, lat, lon
  altitude_value: 0.0       # surface
  default_bbox: [-4.5, 2.5, 3.0, 7.0]  # [minLon, maxLon, minLat, maxLat] for Ghana region
  fill_values: [9999, -9999, 99999, -99999]
  description: "Sentinel-3A OLCI Chlorophyll for MCI-based Sargassum detection"

# Sentinel-3B OLCI Chlorophyll Global 4km — ACTIVE, data to present
s3b_olci_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3BOLCIchlaDaily"
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude"
  time: "time"
  has_altitude: true
  altitude_value: 0.0
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "Sentinel-3B OLCI Chlorophyll for MCI-based Sargassum detection"

# ───── Legacy / inactive datasets (kept for reference) ────────────────

# VIIRS NOAA-20 Daily Chlorophyll — DEPRECATED, data ended 2021-09-02
# Variable is chl_oci (not chlor_a), no altitude dimension.
viirs_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwNPPN20VIIRSchlociDaily"
  var: "chl_oci"             # corrected variable name
  lat: "latitude"
  lon: "longitude"
  time: "time"
  has_altitude: false
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "DEPRECATED — NOAA-20 VIIRS Chlorophyll (data ended 2021-09)"

# ───── Sector datasets (higher resolution, experimental) ──────────────

# S3A OLCI Sector CG — covers West Africa at ~300m; may not always have data
s3a_olci_sector:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3AOLCIchlaSectorCGDaily"
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude"
  time: "time"
  has_altitude: true
  altitude_value: 0.0
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "S3A OLCI 300m Sector CG (West Africa) — experimental"