# ERDDAP Dataset Configuration for Sargassum Detection
# Real dataset IDs found on NOAA CoastWatch ERDDAP servers

# VIIRS Daily Global 4km Chlorophyll (can be used for AFAI calculation)
viirs_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwNPPN20VIIRSchlociDaily"  # NOAA-20 VIIRS Chlorophyll Daily
  var: "chlor_a"  # Base chlorophyll variable (for AFAI calculation)
  lat: "latitude"
  lon: "longitude"
  time: "time"
  default_bbox: [-4.5, 2.5, 3.0, 7.0]  # [minLon, maxLon, minLat, maxLat] for Ghana region
  fill_values: [9999, -9999, 99999, -99999]
  description: "NOAA-20 VIIRS Chlorophyll for AFAI-based Sargassum detection"

# Alternative VIIRS NPP Chlorophyll dataset
viirs_npp_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwNPPVIIRSchlociDaily"  # NPP VIIRS Chlorophyll Daily
  var: "chlor_a"
  lat: "latitude" 
  lon: "longitude"
  time: "time"
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "NPP VIIRS Chlorophyll for AFAI-based Sargassum detection"

# Sentinel-3A OLCI Chlorophyll Global 4km
s3a_olci_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3AOLCIchlaDaily"  # S3A OLCI Chlorophyll Daily Global
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude" 
  time: "time"
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "Sentinel-3A OLCI Chlorophyll for MCI-based Sargassum detection"

# Sentinel-3B OLCI Chlorophyll Global 4km  
s3b_olci_chla:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3BOLCIchlaDaily"  # S3B OLCI Chlorophyll Daily Global
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude"
  time: "time" 
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "Sentinel-3B OLCI Chlorophyll for MCI-based Sargassum detection"

# High-resolution S3A OLCI Sector covering West Africa (if available)
s3a_olci_sector:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3AOLCIchlaSectorCGDaily"  # Sector CG covers West Africa
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude"
  time: "time"
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "S3A OLCI 300m Sector CG (West Africa) for high-res Sargassum detection"

# Alternative high-res sector for Ghana region  
s3a_olci_sector_ch:
  server: "https://coastwatch.noaa.gov/erddap"
  dataset_id: "noaacwS3AOLCIchlaSectorCHDaily"  # Sector CH may cover Ghana
  var: "chlor_a"
  lat: "latitude"
  lon: "longitude"
  time: "time"
  default_bbox: [-4.5, 2.5, 3.0, 7.0]
  fill_values: [9999, -9999, 99999, -99999]
  description: "S3A OLCI 300m Sector CH for high-res Sargassum detection"

