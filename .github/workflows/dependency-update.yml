name: Dependency Update

on:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Update dependencies
      run: |
        npx npm-check-updates -u
        npm install

    - name: Run tests
      run: |
        npm run test --if-present
        npm run build

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: 'Automated dependency updates'
        body: |
          ## Automated Dependency Updates
          
          This PR contains automated updates to npm dependencies.
          
          **Changes:**
          - Updated all dependencies to their latest compatible versions
          - Verified build still passes
          
          **Testing:**
          - [x] Build passes
          - [x] TypeScript compilation succeeds
          
          Please review the changes and test the application before merging.
        branch: automated/dependency-updates
        delete-branch: true