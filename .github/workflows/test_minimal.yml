name: Test Minimal Pipeline

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        pip install geopandas==1.1.1 pandas numpy requests

    - name: Test Python import
      run: |
        python -c "import geopandas; print('geopandas version:', geopandas.__version__)"
        python -c "import pandas; print('pandas version:', pandas.__version__)"

    - name: List scripts directory
      run: |
        echo "Scripts directory contents:"
        ls -la scripts/

    - name: Test ROI script
      run: |
        echo "Testing ROI generation..."
        mkdir -p data
        python scripts/build_roi.py --help || echo "Script help failed"
        
    - name: Show current directory
      run: |
        echo "Current directory:"
        pwd
        echo "Directory contents:"
        ls -la