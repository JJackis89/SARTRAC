name: Daily Sargassum Forecast

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  forecast:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set forecast date
      run: |
        echo "FORECAST_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
        echo "FORECAST_HOURS=72" >> $GITHUB_ENV

    - name: Create output directories
      run: |
        mkdir -p data outputs

    - name: Build ROI
      run: |
        echo "Building Ghana 20nm offshore ROI..."
        python scripts/build_roi.py \
          --out data/ghana_20nm.geojson \
          --nm 20 \
          --verbose

    - name: Run detections
      continue-on-error: true
      run: |
        echo "Running satellite detections..."
        for dataset in viirs_chla s3a_olci_chla s3b_olci_chla; do
          echo "Detecting $dataset..."
          python scripts/detect_erddap_afai.py \
            --date ${FORECAST_DATE} \
            --dataset $dataset \
            --threshold 0.5 \
            --roi data/ghana_20nm.geojson \
            --out data/${dataset}_${FORECAST_DATE}.geojson \
            --verbose || echo "Failed to detect $dataset"
        done

    - name: Merge detections
      run: |
        echo "Merging detection files..."
        python scripts/merge_geojson_points.py \
          data/*_${FORECAST_DATE}.geojson \
          --out data/merged_detections_${FORECAST_DATE}.geojson \
          --date ${FORECAST_DATE} \
          --roi data/ghana_20nm.geojson \
          --verbose || echo '{"type": "FeatureCollection", "features": []}' > data/merged_detections_${FORECAST_DATE}.geojson

    - name: Run drift forecast
      env:
        CURRENTS_URL: ${{ secrets.CURRENTS_URL }}
        WINDS_URL: ${{ secrets.WINDS_URL }}
      run: |
        echo "Running Sargassum drift forecast..."
        
        # Build arguments for ocean/wind data
        args=""
        if [ -n "$CURRENTS_URL" ]; then
          args="$args --currents-url $CURRENTS_URL"
        fi
        if [ -n "$WINDS_URL" ]; then
          args="$args --winds-url $WINDS_URL"
        fi
        
        python scripts/forecast_opendrift.py \
          --detections data/merged_detections_${FORECAST_DATE}.geojson \
          --out outputs/forecast_${FORECAST_DATE}.geojson \
          --hours ${FORECAST_HOURS} \
          --windage 0.01 \
          --particles 5 \
          --roi data/ghana_20nm.geojson \
          $args \
          --verbose

    - name: Generate map
      continue-on-error: true
      run: |
        echo "Generating forecast map..."
        python scripts/render_map.py \
          --roi data/ghana_20nm.geojson \
          --detections data/*_${FORECAST_DATE}.geojson \
          --forecast outputs/forecast_${FORECAST_DATE}.geojson \
          --out outputs/map_${FORECAST_DATE}.png \
          --title "Ghana Sargassum Forecast - ${FORECAST_DATE}" \
          --verbose

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: sargassum-forecast
        path: |
          data/*.geojson
          outputs/*.geojson
          outputs/*.png
        retention-days: 30

    - name: Summary
      run: |
        echo "=== Forecast Complete ==="
        echo "Date: ${FORECAST_DATE}"
        echo "Files generated:"
        ls -la data/ outputs/
        echo "========================"