name: Daily Sargassum Forecast

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  # Default ocean-data URLs (overridden by repository secrets when set)
  DEFAULT_CURRENTS_URL: 'https://tds.hycom.org/thredds/dodsC/GLBy0.08/latest'

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # ── System dependencies for OpenDrift / GDAL / Cartopy ──────────
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgdal-dev libgeos-dev libproj-dev proj-data proj-bin gdal-bin \
          libhdf5-dev libnetcdf-dev gfortran libblas-dev liblapack-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        GDAL_VERSION=$(gdal-config --version)
        pip install "GDAL==${GDAL_VERSION}" || pip install GDAL
        pip install -r requirements.txt

    # ── Environment variables ───────────────────────────────────────
    - name: Set forecast date and environment
      run: |
        echo "FORECAST_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
        echo "FORECAST_HOURS=72" >> $GITHUB_ENV
        echo "RELEASE_TAG=forecast-$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
        # Note: NOMADS OPeNDAP was retired (SCN 25-81). Wind data is now
        # downloaded as local NetCDF by download_ocean_data.py (UCAR THREDDS).
        # DEFAULT_WINDS_URL kept only as a last-resort fallback if secrets set.
        echo "DEFAULT_WINDS_URL=" >> $GITHUB_ENV

    - name: Create output directories
      run: mkdir -p data outputs

    # ── Build ROI ───────────────────────────────────────────────────
    - name: Build ROI
      run: |
        python scripts/build_roi.py \
          --out data/ghana_20nm.geojson --nm 20 --verbose

    # ── Resolve ocean-data URLs ─────────────────────────────────────
    - name: Resolve ocean data URLs
      id: ocean_urls
      env:
        SECRET_CURRENTS: ${{ secrets.CURRENTS_URL }}
        SECRET_WINDS: ${{ secrets.WINDS_URL }}
      run: |
        if [ -n "$SECRET_CURRENTS" ]; then
          echo "RESOLVED_CURRENTS_URL=$SECRET_CURRENTS" >> $GITHUB_ENV
          echo "currents_source=secret" >> $GITHUB_OUTPUT
        else
          echo "RESOLVED_CURRENTS_URL=$DEFAULT_CURRENTS_URL" >> $GITHUB_ENV
          echo "currents_source=default-hycom" >> $GITHUB_OUTPUT
        fi
        if [ -n "$SECRET_WINDS" ]; then
          echo "RESOLVED_WINDS_URL=$SECRET_WINDS" >> $GITHUB_ENV
          echo "winds_source=secret" >> $GITHUB_OUTPUT
        else
          echo "RESOLVED_WINDS_URL=$DEFAULT_WINDS_URL" >> $GITHUB_ENV
          echo "winds_source=default-gfs" >> $GITHUB_OUTPUT
        fi

    - name: Test ocean data connectivity
      continue-on-error: true
      run: |
        echo "Currents → ${RESOLVED_CURRENTS_URL}"
        curl -sI --max-time 15 "${RESOLVED_CURRENTS_URL}" | head -3 || echo "⚠ currents unreachable"
        echo "Winds → ${RESOLVED_WINDS_URL}"
        curl -sI --max-time 15 "${RESOLVED_WINDS_URL}" | head -3 || echo "⚠ winds unreachable"

    # ── Detection: ERDDAP chlorophyll (Sentinel-3 OLCI — active) ──────
    - name: Run ERDDAP detections
      continue-on-error: true
      run: |
        # Query only active S3 datasets (VIIRS NOAA-20 data ended 2021)
        # Use --lookback 7 because satellite data has 1-7 day latency
        # and individual days may be fully cloud-covered.
        # Threshold 0.3 mg/m³ is appropriate for Gulf of Guinea Sargassum.
        for ds in s3a_olci_chla s3b_olci_chla; do
          echo "  → $ds"
          python scripts/detect_erddap_afai.py \
            --date "$FORECAST_DATE" --dataset "$ds" --threshold 0.3 \
            --lookback 7 \
            --roi data/ghana_20nm.geojson \
            --out "data/${ds}_${FORECAST_DATE}.geojson" \
            --verbose || echo "  ⚠ $ds failed"
        done

    # ── Detection: GEE OLCI AFAI/MCI (if credentials present) ──────
    - name: Run GEE OLCI detection
      continue-on-error: true
      env:
        EE_SERVICE_ACCOUNT: ${{ secrets.EE_SERVICE_ACCOUNT }}
        EE_PRIVATE_KEY: ${{ secrets.EE_PRIVATE_KEY }}
      run: |
        if [ -n "$EE_SERVICE_ACCOUNT" ]; then
          echo "Running GEE OLCI AFAI/MCI detection..."
          python scripts/detect_gee_olci.py \
            --date "$FORECAST_DATE" \
            --lookback 7 \
            --out "data/gee_olci_${FORECAST_DATE}.geojson" \
            --verbose || echo "⚠ GEE OLCI detection failed"
        else
          echo "ℹ Skipping GEE detection (EE_SERVICE_ACCOUNT not configured)"
        fi

    # ── Merge all detection sources ─────────────────────────────────
    - name: Merge detections
      run: |
        python scripts/merge_geojson_points.py \
          data/*_${FORECAST_DATE}.geojson \
          --out "data/merged_detections_${FORECAST_DATE}.geojson" \
          --date "$FORECAST_DATE" \
          --roi data/ghana_20nm.geojson \
          --verbose \
        || echo '{"type":"FeatureCollection","features":[]}' \
             > "data/merged_detections_${FORECAST_DATE}.geojson"

    # ── Detection fallback: use yesterday's if today has too few ────
    - name: Check detection count and fallback
      run: |
        COUNT=$(python3 -c "import json; print(len(json.load(open('data/merged_detections_${FORECAST_DATE}.geojson')).get('features',[])))" 2>/dev/null || echo 0)
        echo "Today's detections: $COUNT"
        echo "DETECTION_COUNT=$COUNT" >> $GITHUB_ENV

        if [ "$COUNT" -lt 20 ]; then
          echo "⚠ Low detection count ($COUNT < 20) — trying previous day's release..."
          YESTERDAY=$(date -u -d "${FORECAST_DATE} -1 day" +%Y-%m-%d 2>/dev/null \
                   || python3 -c "from datetime import datetime,timedelta; print((datetime.strptime('${FORECAST_DATE}','%Y-%m-%d')-timedelta(days=1)).strftime('%Y-%m-%d'))")
          PREV_TAG="forecast-${YESTERDAY}"
          echo "Looking for release: $PREV_TAG"

          # Download previous day's detections
          gh release download "$PREV_TAG" \
            --pattern "merged_detections_${YESTERDAY}.geojson" \
            --dir data/ --clobber 2>/dev/null && {
            PREV_COUNT=$(python3 -c "import json; print(len(json.load(open('data/merged_detections_${YESTERDAY}.geojson')).get('features',[])))" 2>/dev/null || echo 0)
            echo "Previous day's detections: $PREV_COUNT"

            if [ "$PREV_COUNT" -gt "$COUNT" ]; then
              echo "Merging today's + yesterday's detections..."
              python scripts/merge_geojson_points.py \
                data/*_${FORECAST_DATE}.geojson \
                "data/merged_detections_${YESTERDAY}.geojson" \
                --out "data/merged_detections_${FORECAST_DATE}.geojson" \
                --date "$FORECAST_DATE" \
                --roi data/ghana_20nm.geojson \
                --verbose || true
              FINAL=$(python3 -c "import json; print(len(json.load(open('data/merged_detections_${FORECAST_DATE}.geojson')).get('features',[])))" 2>/dev/null || echo 0)
              echo "Final merged detections: $FINAL"
              echo "DETECTION_COUNT=$FINAL" >> $GITHUB_ENV
            fi
          } || echo "No previous release found — using today's $COUNT detections"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── Inject CoastSnap ground-truth seeds ───────────────────────────
    # Satellite detection often misses the Western Region due to cloud
    # cover or turbidity.  CoastSnap monitoring points are confirmed
    # beaching locations — inject them as supplementary seed points so
    # the forecast always covers these hotspots.
    - name: Inject CoastSnap ground-truth seeds
      run: |
        python scripts/inject_coastsnap_seeds.py \
          --detections "data/merged_detections_${FORECAST_DATE}.geojson" \
          --date "$FORECAST_DATE" \
          --verbose
        FINAL=$(python3 -c "import json; print(len(json.load(open('data/merged_detections_${FORECAST_DATE}.geojson')).get('features',[])))" 2>/dev/null || echo 0)
        echo "Detections after CoastSnap injection: $FINAL"

    # ── Download ocean data (HYCOM currents + GFS winds) ────────────
    - name: Download ocean data
      id: ocean_data
      continue-on-error: true
      run: |
        python scripts/download_ocean_data.py \
          --date "$FORECAST_DATE" \
          --hours 168 \
          --out-dir data/ocean \
          --verbose

    # ── Drift forecast (multi-horizon: 3d, 5d, 7d) ─────────────────
    - name: Run drift forecasts
      run: |
        args=""
        # Prefer local downloaded files, then OPeNDAP URLs
        if [ -n "$CURRENTS_FILE" ] && [ -f "$CURRENTS_FILE" ]; then
          args="$args --currents-file $CURRENTS_FILE"
          echo "Using local currents: $CURRENTS_FILE"
        fi
        if [ -n "$WINDS_FILE" ] && [ -f "$WINDS_FILE" ]; then
          args="$args --winds-file $WINDS_FILE"
          echo "Using local winds: $WINDS_FILE"
        fi
        # Also pass OPeNDAP URLs as secondary fallback
        [ -n "$RESOLVED_CURRENTS_URL" ] && args="$args --currents-url $RESOLVED_CURRENTS_URL"
        [ -n "$RESOLVED_WINDS_URL" ]    && args="$args --winds-url $RESOLVED_WINDS_URL"

        for HOURS in 72 120 168; do
          DAYS=$((HOURS / 24))
          echo "▸ Running ${DAYS}-day (${HOURS}h) forecast..."
          python scripts/forecast_opendrift.py \
            --detections "data/merged_detections_${FORECAST_DATE}.geojson" \
            --out "outputs/forecast_${FORECAST_DATE}_${DAYS}d.geojson" \
            --hours "$HOURS" --windage 0.01 --particles 5 \
            --roi data/ghana_20nm.geojson \
            $args --verbose || echo "  ⚠ ${DAYS}d forecast failed"
        done

        # Copy the 3-day as the default forecast file for backwards compatibility
        cp "outputs/forecast_${FORECAST_DATE}_3d.geojson" \
           "outputs/forecast_${FORECAST_DATE}.geojson" 2>/dev/null || true

    # ── Static map (optional) ───────────────────────────────────────
    - name: Generate map
      continue-on-error: true
      run: |
        python scripts/render_map.py \
          --roi data/ghana_20nm.geojson \
          --detections data/*_${FORECAST_DATE}.geojson \
          --forecast "outputs/forecast_${FORECAST_DATE}.geojson" \
          --out "outputs/map_${FORECAST_DATE}.png" \
          --title "Ghana Sargassum Forecast — ${FORECAST_DATE}" \
          --verbose

    # ── Ensure output exists ────────────────────────────────────────
    - name: Prepare release files
      run: |
        ls -la data/ outputs/
        if [ ! -f "outputs/forecast_${FORECAST_DATE}.geojson" ]; then
          echo '{"type":"FeatureCollection","features":[],"properties":{"date":"'"${FORECAST_DATE}"'","status":"no_data"}}' \
            > "outputs/forecast_${FORECAST_DATE}.geojson"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sargassum-forecast-${{ env.FORECAST_DATE }}
        path: |
          data/*.geojson
          outputs/*.geojson
          outputs/*.png
        retention-days: 30

    # ── Release ─────────────────────────────────────────────────────
    - name: Delete existing release if present
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true
        git push origin --delete "$RELEASE_TAG" 2>/dev/null || true

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        FF="outputs/forecast_${FORECAST_DATE}.geojson"
        DF="data/merged_detections_${FORECAST_DATE}.geojson"
        MF="outputs/map_${FORECAST_DATE}.png"

        PARTICLES=$(python3 -c "import json; print(len(json.load(open('$FF')).get('features',[])))" 2>/dev/null || echo "?")
        DETECTIONS=$(python3 -c "import json; print(len(json.load(open('$DF')).get('features',[])))" 2>/dev/null || echo "?")
        P5D=$(python3 -c "import json,pathlib; f=pathlib.Path('outputs/forecast_${FORECAST_DATE}_5d.geojson'); print(len(json.load(open(f)).get('features',[])) if f.exists() else '–')" 2>/dev/null || echo "–")
        P7D=$(python3 -c "import json,pathlib; f=pathlib.Path('outputs/forecast_${FORECAST_DATE}_7d.geojson'); print(len(json.load(open(f)).get('features',[])) if f.exists() else '–')" 2>/dev/null || echo "–")

        cat > release_notes.md <<EOF
        ## Ghana Sargassum Forecast — ${FORECAST_DATE}

        | Detail | Value |
        |--------|-------|
        | Detections | ${DETECTIONS} points |
        | 3-day forecast | ${PARTICLES} particles |
        | 5-day forecast | ${P5D} particles |
        | 7-day forecast | ${P7D} particles |
        | Currents source | ${{ env.CURRENTS_FILE && 'HYCOM-local' || steps.ocean_urls.outputs.currents_source }} |
        | Winds source | ${{ env.WINDS_FILE && 'GFS-local' || steps.ocean_urls.outputs.winds_source }} |
        | Run | #${{ github.run_number }} |

        ### Files
        - \`forecast_${FORECAST_DATE}.geojson\` — 3-day drift forecast (default)
        - \`forecast_${FORECAST_DATE}_3d.geojson\` — 3-day (72 h) drift forecast
        - \`forecast_${FORECAST_DATE}_5d.geojson\` — 5-day (120 h) drift forecast
        - \`forecast_${FORECAST_DATE}_7d.geojson\` — 7-day (168 h) drift forecast
        - \`merged_detections_${FORECAST_DATE}.geojson\` — detection points
        - \`map_${FORECAST_DATE}.png\` — static map

        **Next forecast:** tomorrow 06:00 UTC
        EOF

        FILES=""
        [ -f "$FF" ] && FILES="$FILES $FF"
        [ -f "outputs/forecast_${FORECAST_DATE}_3d.geojson" ] && FILES="$FILES outputs/forecast_${FORECAST_DATE}_3d.geojson"
        [ -f "outputs/forecast_${FORECAST_DATE}_5d.geojson" ] && FILES="$FILES outputs/forecast_${FORECAST_DATE}_5d.geojson"
        [ -f "outputs/forecast_${FORECAST_DATE}_7d.geojson" ] && FILES="$FILES outputs/forecast_${FORECAST_DATE}_7d.geojson"
        [ -f "$DF" ] && FILES="$FILES $DF"
        [ -f "$MF" ] && FILES="$FILES $MF"

        gh release create "$RELEASE_TAG" \
          --title "Sargassum Forecast ${FORECAST_DATE}" \
          --notes-file release_notes.md --latest \
          $FILES \
        || echo "⚠ Release creation failed"

    - name: Workflow summary
      run: |
        echo "=== Forecast complete ==="
        echo "Date:    ${FORECAST_DATE}"
        echo "Release: ${RELEASE_TAG}"
        find data/ outputs/ -name "*${FORECAST_DATE}*" -type f -exec du -h {} \;
        echo "https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"

    # ── Alert notifications ─────────────────────────────────────────
    - name: Send alert notifications
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      run: |
        python scripts/notify_alerts.py \
          --forecast "outputs/forecast_${FORECAST_DATE}.geojson" \
          --detections "data/merged_detections_${FORECAST_DATE}.geojson" \
          --date "$FORECAST_DATE" \
          --min-severity moderate \
          --verbose
