name: Daily Sargassum Forecast

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  forecast:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set forecast date and environment
      run: |
        echo "FORECAST_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
        echo "FORECAST_HOURS=72" >> $GITHUB_ENV
        echo "RELEASE_TAG=forecast-$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

    - name: Create output directories
      run: |
        mkdir -p data outputs

    - name: Build ROI
      run: |
        echo "Building Ghana 20nm offshore ROI..."
        python scripts/build_roi.py \
          --out data/ghana_20nm.geojson \
          --nm 20 \
          --verbose

    - name: Test ocean data connectivity
      env:
        CURRENTS_URL: ${{ secrets.CURRENTS_URL }}
        WINDS_URL: ${{ secrets.WINDS_URL }}
      run: |
        echo "Testing ocean data sources..."
        echo "CURRENTS_URL: ${CURRENTS_URL:-'Not configured'}"
        echo "WINDS_URL: ${WINDS_URL:-'Not configured'}"
        
        # Test connectivity if URLs are provided
        if [ -n "$CURRENTS_URL" ]; then
          echo "Testing currents data access..."
          curl -I "$CURRENTS_URL" || echo "Warning: CURRENTS_URL not accessible"
        fi
        
        if [ -n "$WINDS_URL" ]; then
          echo "Testing winds data access..."
          curl -I "$WINDS_URL" || echo "Warning: WINDS_URL not accessible"
        fi

    - name: Run detections
      continue-on-error: true
      run: |
        echo "Running satellite detections..."
        for dataset in viirs_chla s3a_olci_chla s3b_olci_chla; do
          echo "Detecting $dataset..."
          python scripts/detect_erddap_afai.py \
            --date ${FORECAST_DATE} \
            --dataset $dataset \
            --threshold 0.5 \
            --roi data/ghana_20nm.geojson \
            --out data/${dataset}_${FORECAST_DATE}.geojson \
            --verbose || echo "Failed to detect $dataset"
        done

    - name: Merge detections
      run: |
        echo "Merging detection files..."
        python scripts/merge_geojson_points.py \
          data/*_${FORECAST_DATE}.geojson \
          --out data/merged_detections_${FORECAST_DATE}.geojson \
          --date ${FORECAST_DATE} \
          --roi data/ghana_20nm.geojson \
          --verbose || echo '{"type": "FeatureCollection", "features": []}' > data/merged_detections_${FORECAST_DATE}.geojson

    - name: Run drift forecast
      env:
        CURRENTS_URL: ${{ secrets.CURRENTS_URL }}
        WINDS_URL: ${{ secrets.WINDS_URL }}
      run: |
        echo "Running Sargassum drift forecast..."
        
        # Build arguments for ocean/wind data
        args=""
        if [ -n "$CURRENTS_URL" ]; then
          args="$args --currents-url $CURRENTS_URL"
        fi
        if [ -n "$WINDS_URL" ]; then
          args="$args --winds-url $WINDS_URL"
        fi
        
        python scripts/forecast_opendrift.py \
          --detections data/merged_detections_${FORECAST_DATE}.geojson \
          --out outputs/forecast_${FORECAST_DATE}.geojson \
          --hours ${FORECAST_HOURS} \
          --windage 0.01 \
          --particles 5 \
          --roi data/ghana_20nm.geojson \
          $args \
          --verbose

    - name: Generate map
      continue-on-error: true
      run: |
        echo "Generating forecast map..."
        python scripts/render_map.py \
          --roi data/ghana_20nm.geojson \
          --detections data/*_${FORECAST_DATE}.geojson \
          --forecast outputs/forecast_${FORECAST_DATE}.geojson \
          --out outputs/map_${FORECAST_DATE}.png \
          --title "Ghana Sargassum Forecast - ${FORECAST_DATE}" \
          --verbose

    - name: Prepare release files
      run: |
        echo "Preparing files for release..."
        ls -la data/ outputs/
        
        # Ensure forecast file exists
        if [ ! -f "outputs/forecast_${FORECAST_DATE}.geojson" ]; then
          echo "Warning: Forecast file not found, creating placeholder..."
          echo '{"type": "FeatureCollection", "features": [], "properties": {"date": "'${FORECAST_DATE}'", "status": "no_data"}}' > outputs/forecast_${FORECAST_DATE}.geojson
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sargassum-forecast-${{ env.FORECAST_DATE }}
        path: |
          data/*.geojson
          outputs/*.geojson
          outputs/*.png
        retention-days: 30

    - name: Check if release exists
      id: check_release
      continue-on-error: true
      run: |
        # Check if tag already exists
        if git rev-parse "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Tag ${{ env.RELEASE_TAG }} already exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Tag ${{ env.RELEASE_TAG }} does not exist"
        fi

    - name: Delete existing tag if exists
      if: steps.check_release.outputs.exists == 'true'
      run: |
        echo "Deleting existing tag: ${{ env.RELEASE_TAG }}"
        git tag -d "${{ env.RELEASE_TAG }}" || echo "Local tag not found"
        git push origin --delete "${{ env.RELEASE_TAG }}" || echo "Remote tag not found"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Debug GitHub Permissions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "=== GitHub CLI Debug Information ==="
        echo "Repository: ${{ github.repository }}"
        echo "Actor: ${{ github.actor }}"
        echo "Event: ${{ github.event_name }}"
        
        echo "Checking GitHub CLI authentication..."
        gh auth status || echo "GitHub CLI auth failed"
        
        echo "Testing repository access..."
        gh repo view ${{ github.repository }} --json name,permissions || echo "Cannot view repository"
        
        echo "Testing release permissions..."
        gh release list --repo ${{ github.repository }} --limit 1 || echo "Cannot list releases"
        
        echo "=== End Debug ==="

    - name: Create GitHub Release with CLI
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Creating release using GitHub CLI..."
        
        # Create release notes
        cat > release_notes.md << 'EOF'
        ## Ghana Sargassum Forecast - ${{ env.FORECAST_DATE }}
        
        **Forecast Duration**: ${{ env.FORECAST_HOURS }} hours (3 days)
        **Generation Time**: $(date -u)
        **Workflow Run**: #${{ github.run_number }}
        **Status**: ✅ Complete
        
        ### 📊 Forecast Details
        - **Region**: Ghana coastline (0-20 nautical miles offshore)
        - **Model**: OpenDrift oceanographic model
        - **Data Sources**: VIIRS, Sentinel-3 OLCI satellite data
        - **Ocean Data**: NOAA RTOFS currents, GFS winds
        
        ### 📁 Files Included
        - `forecast_${{ env.FORECAST_DATE }}.geojson` - Main drift forecast (72h)
        - `merged_detections_${{ env.FORECAST_DATE }}.geojson` - Satellite detection points
        - `map_${{ env.FORECAST_DATE }}.png` - Forecast visualization map
        
        ### 🌊 Usage Instructions
        1. **Web Application**: Load the forecast file in the React visualization app
        2. **GIS Software**: Import GeoJSON files into QGIS, ArcGIS, or similar tools  
        3. **API Integration**: Use the forecast data in custom applications
        
        ### 🔍 Data Quality
        - Confidence decreases over forecast duration (Day 1: High, Day 2-3: Medium)
        - Weather conditions and ocean currents affect forecast accuracy
        - Real-time satellite data used for initial conditions
        
        ---
        
        **🔄 Next forecast**: Tomorrow at 06:00 UTC  
        **🌐 Visualization**: Load this data in the SARTRAC web application  
        **📧 Support**: Contact the SARTRAC team for questions about this forecast
        EOF
        
        # Delete existing release if it exists
        gh release delete "${{ env.RELEASE_TAG }}" --yes || echo "Release doesn't exist"
        
        # Create new release
        gh release create "${{ env.RELEASE_TAG }}" \
          --title "Sargassum Forecast ${{ env.FORECAST_DATE }}" \
          --notes-file release_notes.md \
          --latest \
          outputs/forecast_${{ env.FORECAST_DATE }}.geojson \
          data/merged_detections_${{ env.FORECAST_DATE }}.geojson \
          outputs/map_${{ env.FORECAST_DATE }}.png \
          || echo "Release creation failed, but continuing workflow"

    - name: Workflow Summary
      run: |
        echo "=== Ghana Sargassum Forecast Complete ==="
        echo "📅 Date: ${FORECAST_DATE}"
        echo "⏱️  Duration: ${FORECAST_HOURS} hours" 
        echo "🏷️  Release: ${RELEASE_TAG}"
        echo "📊 Files generated:"
        find data/ outputs/ -name "*${FORECAST_DATE}*" -type f | while read file; do
          size=$(du -h "$file" | cut -f1)
          echo "  📄 $file ($size)"
        done
        echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
        echo "✅ Workflow completed successfully!"
        echo "============================================="

    - name: Update latest forecast symlink
      run: |
        # Create symlinks for latest forecast (for easy web app integration)
        cd outputs/
        ln -sf forecast_${FORECAST_DATE}.geojson latest_forecast.geojson
        cd ../data/
        ln -sf merged_detections_${FORECAST_DATE}.geojson latest_detections.geojson
        echo "Updated latest forecast symlinks"